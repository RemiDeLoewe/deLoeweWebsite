        :root {

            --glass-border: rgba(255, 255, 255, 0.1);

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

            padding: 50px 30px;

            border: 1px solid rgba(92, 225, 230, 0.2);

            backdrop-filter: blur(12px);
            margin: 20px;

        .logo-byb {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -3px;
            background: linear-gradient(90deg, var(--cyan), var(--mint));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        h1 { font-size: 1.2rem; margin-bottom: 30px; color: #888; text-transform: uppercase; letter-spacing: 4px; }

            line-height: 1.4;
            margin-bottom: 30px;
            color: #efefef;
        }
        
        .tagline span { font-weight: 800; color: var(--mint); }

        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 40px 0;
        }

        .feat-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--cyan);
            text-transform: uppercase;
        }

        .cta-discord {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, var(--cyan), var(--mint));
            color: var(--dark);
            padding: 20px 40px;
            border-radius: 16px;
            font-weight: 800;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
        }

        .cta-discord:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(24, 203, 150, 0.3);
        }

        .cta-discord svg { fill: var(--dark); width: 24px; }

        .footer-note {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            .features { grid-template-columns: 1fr; }
