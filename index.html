<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Loewe | Excellence & Innovation</title>
    <style>
        :root {
            --cyan: #5ce1e6;
            --mint: #18cb96;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--dark);
            color: white;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Arrière-plan avec des lueurs colorées diffuses */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(92, 225, 230, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(24, 203, 150, 0.05) 0%, transparent 40%);
        }

        /* Header Minimaliste */
        header {
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--cyan), var(--mint));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
        }

        .badge {
            background: var(--glass);
            border: 1px solid rgba(92, 225, 230, 0.2);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: var(--cyan);
            margin-bottom: 20px;
            text-transform: uppercase;
            animation: fadeIn 1.5s ease;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            line-height: 1.1;
            margin-bottom: 20px;
            font-weight: 900;
        }

        h1 span {
            color: var(--mint);
        }

        .description {
            max-width: 600px;
            font-size: 1.1rem;
            color: #999;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Bouton Stylé */
        .cta {
            background: linear-gradient(135deg, var(--cyan), var(--mint));
            color: var(--dark);
            padding: 18px 40px;
            border-radius: 12px;
            font-weight: bold;
            text-decoration: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            box-shadow: 0 10px 30px rgba(24, 203, 150, 0.2);
        }

        .cta:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(24, 203, 150, 0.4);
        }

        /* Footer */
        footer {
            padding: 40px;
            text-align: center;
            font-size: 0.8rem;
            color: #444;
            border-top: 1px solid var(--glass);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            animation: fadeIn 1s ease forwards;
        }

        /* Le Cœur (Déco subtile) */
        .heart-icon {
            color: var(--mint);
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <header>
        <div class="logo">DE LOEWE</div>
    </header>

    <main class="hero">
        <span class="badge">Nouveau Chapitre</span>
        
        <div class="heart-icon">💚</div>

        <h1 class="reveal">L'avenir se dessine <br><span>avec passion.</span></h1>
        
        <p class="description reveal" style="animation-delay: 0.2s;">
            De Loewe redéfinit les standards pour vous offrir une expérience unique, 
            mêlant l'élégance de demain à l'innovation d'aujourd'hui.
        </p>

        <a href="mailto:contact@deloewe.com" class="cta reveal" style="animation-delay: 0.4s;">Nous contacter</a>
    </main>

    <footer>
        &copy; 2026 DE LOEWE. Tous droits réservés.
    </footer>

</body>
</html>
