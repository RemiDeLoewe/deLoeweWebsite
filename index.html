<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Loewe | Ethique & Innovation</title>
    <style>
        :root {
            --cyan: #5ce1e6;
            --mint: #18cb96;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--dark);
            color: white;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(92, 225, 230, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(24, 203, 150, 0.05) 0%, transparent 40%);
        }

        header {
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--cyan), var(--mint));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Language Toggle Button */
        .lang-switch {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .lang-switch:hover {
            border-color: var(--cyan);
            background: rgba(255, 255, 255, 0.08);
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 10%;
        }

        .badge {
            background: var(--glass);
            border: 1px solid rgba(92, 225, 230, 0.2);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.8rem;
            color: var(--cyan);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            line-height: 1.1;
            margin-bottom: 20px;
            font-weight: 900;
        }

        h1 span { color: var(--mint); }

        .grid-container {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin-top: 40px;
        }

        .main-project {
            grid-row: span 2;
            background: var(--glass);
            border: 1px solid var(--cyan);
            padding: 40px;
            border-radius: 20px;
            text-align: left;
        }

        .ethical-tag {
            display: inline-block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--cyan);
            margin-bottom: 10px;
        }

        .main-project h3 { font-size: 1.8rem; color: var(--cyan); margin-bottom: 15px; }
        .main-project p { color: #ccc; line-height: 1.6; }

        .side-project {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
        }

        .side-project span { color: var(--mint); text-transform: uppercase; font-size: 0.75rem; font-weight: bold; }
        .side-project em { font-size: 0.7rem; color: #666; margin-top: 5px; }

        .cta {
            background: linear-gradient(135deg, var(--cyan), var(--mint));
            color: var(--dark);
            padding: 18px 40px;
            border-radius: 12px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            margin-top: 50px;
            transition: transform 0.3s ease;
        }

        .cta:hover { transform: translateY(-3px); }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 25px;
            padding: 12px 20px;
            background: rgba(88, 101, 242, 0.1);
            border: 1px solid rgba(88, 101, 242, 0.4);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        footer { padding: 40px; text-align: center; font-size: 0.8rem; color: #444; border-top: 1px solid var(--glass); }

        @media (max-width: 600px) {
            .grid-container { grid-template-columns: 1fr; }
            .main-project { grid-row: auto; }
        }

        .reveal { animation: fadeIn 1s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <header>
        <div class="logo">DE LOEWE</div>
        <button class="lang-switch" onclick="toggleLanguage()" id="langBtn">EN</button>
    </header>

    <main class="hero">
        <div class="heart-icon" style="font-size: 2rem; margin-bottom: 10px;">💚</div>

        <h1 class="reveal" data-i18n="hero-title">Ethics serving <br><span>the global market.</span></h1>
        
        <div class="grid-container reveal">
            <div class="main-project">
                <span class="ethical-tag" data-i18n="tag-custom">Tailor-made</span>
                <h3 data-i18n="grid-title">Web & Discord</h3>
                <p data-i18n="grid-desc">Development of bots and websites created by humans, for humans. No soulless automation.</p>
                
                <a href="https://discord.gg/9hhWPXvgqv" target="_blank" class="discord-btn">
                    <svg width="20" viewBox="0 0 127.14 96.36" fill="currentColor"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.06,72.06,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.39,80.21a105.73,105.73,0,0,0,32.22,16.15,77.7,77.7,0,0,0,7.37-12,67.65,67.65,0,0,1-11.9-5.69c.91-.66,1.8-1.34,2.66-2a75.6,75.6,0,0,0,65.8,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-11.9,5.69,77.67,77.67,0,0,0,7.37,12,105.54,105.54,0,0,0,32.22-16.14C130.34,50.67,125.75,26.92,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5.07-12.69,11.45-12.69S54.18,46,53.92,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5.07-12.69,11.44-12.69S96.14,46,95.89,53,90.71,65.69,84.69,65.69Z"/></svg>
                    <span data-i18n="btn-discord">Join Discord</span>
                </a>
            </div>

            <div class="side-project">
                <span data-i18n="side-1">Sustainable Logistics</span>
                <em data-i18n="coming-soon">Coming soon...</em>
            </div>

            <div class="side-project">
                <span data-i18n="side-2">Human Proximity</span>
                <em data-i18n="coming-soon">Coming soon...</em>
            </div>
        </div>

        <a href="mailto:remi.de.loewe@proton.me" class="cta reveal" data-i18n="cta-main">Start a project</a>
    </main>

    <footer>
        &copy; 2026 DE LOEWE. <span data-i18n="footer-rights">All rights reserved.</span>
    </footer>

    <script>
        const translations = {
            fr: {
                "hero-title": "L'éthique au service <br><span>du grand marché.</span>",
                "tag-custom": "Sur-mesure",
                "grid-title": "Web & Discord",
                "grid-desc": "Développement de bots et sites web créés par des humains, pour des humains. Pas d'automatisation sans âme.",
                "btn-discord": "Rejoindre le Discord",
                "side-1": "Logistique durable",
                "side-2": "Proximité humaine",
                "coming-soon": "Bientôt...",
                "cta-main": "Lancer un projet",
                "footer-rights": "Tous droits réservés."
            },
            en: {
                "hero-title": "Ethics serving <br><span>the global market.</span>",
                "tag-custom": "Tailor-made",
                "grid-title": "Web & Discord",
                "grid-desc": "Development of bots and websites created by humans, for humans. No soulless automation.",
                "btn-discord": "Join Discord",
                "side-1": "Sustainable Logistics",
                "side-2": "Human Proximity",
                "coming-soon": "Coming soon...",
                "cta-main": "Start a project",
                "footer-rights": "All rights reserved."
            }
        };

        let currentLang = localStorage.getItem('lang') || 'fr';

        function updateContent() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerHTML = translations[currentLang][key];
            });
            document.getElementById('langBtn').innerText = currentLang === 'fr' ? 'EN' : 'FR';
        }

        function toggleLanguage() {
            currentLang = currentLang === 'fr' ? 'en' : 'fr';
            localStorage.setItem('lang', currentLang);
            updateContent();
        }

        // Initialiser au chargement
        updateContent();
    </script>
</body>
</html>
