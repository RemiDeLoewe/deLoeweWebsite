<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bientôt disponible</title>
    <style>
        /* Supprime les marges par défaut */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Empêche le scroll si l'image dépasse un peu */
            font-family: sans-serif;
            background-color: #000;
        }

        /* Conteneur principal */
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* L'image en plein écran */
        img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Remplit l'écran sans déformer l'image */
            z-index: 1;
        }

        /* Style du texte */
        .overlay-text {
            position: relative;
            z-index: 2;
            color: white;
            font-size: clamp(2rem, 8vw, 5rem); /* Taille adaptable (mobile friendly) */
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7); /* Ombre pour la lisibilité */
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="public/images/deLoeweBG.png" alt="Image de fond">
        
        <div class="overlay-text">
            Nous arrivons bientôt.
        </div>
    </div>

</body>
</html>
